name: Deploy to Server

# 触发条件：当 main 分支有 push 时触发
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4  # 升级到v4

      # 2. 安装 Node.js 环境
      - name: Use Node.js
        uses: actions/setup-node@v4  # 升级到v4
        with:
          node-version: '20'  # 建议使用LTS版本

      # 3. 安装依赖并打包
      - name: Install and Build
        run: |
          npm ci
          npm run build

      # 4. 通过 SSH 部署到服务器
      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@main
        env:
          # SSH连接配置
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}  # 确保在GitHub Secrets中配置此变量
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: "22"  # 必须用字符串格式

          # Rsync配置
          SOURCE: "dist/"
          TARGET: ${{ secrets.TARGET }}
          ARGS: "-avzr --delete --exclude=.*"
          EXCLUDE: "/node_modules/,/.git/"  # 排除更多无用目录

          # 部署后脚本（关键：修复权限）
          SCRIPT_AFTER: |
            sudo chown -R www:www ${{ secrets.TARGET }}
            sudo chmod -R 755 ${{ secrets.TARGET }}
            echo "Deployment completed successfully"