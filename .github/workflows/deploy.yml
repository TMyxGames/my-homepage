name: Deploy Vue Project

# 触发条件：当 main 分支有 push 时触发
on:
  push:
    branches:
      - main  # 如果你的主分支叫 master，请修改为 master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 安装 Node.js 环境
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # 根据你本地的 Node 版本

      # 3. 安装依赖并打包
      - name: Install and Build
        run: |
          npm install
          npm run build

      # 4. 通过 SSH 部署到服务器
      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_PASS }} # 这里虽然叫 PRIVATE_KEY，但该插件支持直接填密码
          ARGS: "-avzr --delete" # rsync 参数，--delete 会删除服务器上旧的、dist里没有的文件
          SOURCE: "dist/" # 打包后的目录
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: "/www/wwwroot/n0v0rland.xyz" # 刚才在宝塔里创建的网站根目录
          EXCLUDE: "/node_modules/"